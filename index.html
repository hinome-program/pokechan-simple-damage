<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケチャンシンプルダメ計 | Battle Arena</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">

        <!-- Battle Field -->
        <div class="battle-field">
            <div class="horizon"></div>

            <!-- 上段: 防御側 — パネル(左) + 画像(右) -->
            <div class="battle-row battle-top">
                <div id="defender-panel" class="status-panel">
                    <div class="white-panel">
                        <div class="panel-header">
                            <input type="text" id="defender-name" list="pokemon-list"
                                   placeholder="ポケモンのなまえ" class="name-input" autocomplete="off">
                            <span class="lv-badge">Lv.50</span>
                        </div>
                        <div class="panel-stats">
                            <div class="stat-row ev-row">
                                <label>HP努力値</label>
                                <input type="number" id="defender-hp-ev" value="0" min="0" max="32">
                            </div>
                            <div class="stat-row">
                                <label>HP実数値</label>
                                <input type="number" id="defender-hp" value="100">
                            </div>
                            <div class="stat-row ev-row">
                                <label id="defender-ev-label">ぼうぎょ努力値</label>
                                <input type="number" id="defender-stat-ev" value="0" min="0" max="32">
                            </div>
                            <div class="stat-row">
                                <label id="defender-stat-label">ぼうぎょ実数値</label>
                                <input type="number" id="defender-stat" value="100">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="artwork-box">
                    <div class="silhouette-fallback" id="defender-fallback">?</div>
                    <img id="defender-artwork" src="" alt="" class="pokemon-img">
                </div>
            </div>

            <!-- 中央: 戦略コマンドセンター（3カラム） -->
            <div class="strategy-center">

                <!-- 左カラム: 巨大攻撃モードトグル -->
                <div class="strategy-col col-toggle">
                    <button id="mode-toggle" class="giant-mode-toggle mode-physical">こうげき</button>
                </div>

                <!-- 中央カラム: わざ設定パネル -->
                <div class="strategy-col col-move">
                    <div id="move-panel" class="move-panel-inner">
                        <div class="white-panel compact">
                            <div class="mini-title">わざ設定</div>
                            <div class="move-inputs">
                                <div class="move-row">
                                    <label>技の威力</label>
                                    <select id="move-power"></select>
                                </div>
                                <div class="move-row">
                                    <label>技のタイプ</label>
                                    <select id="move-type">
                                        <option value="ノーマル">ノーマル</option>
                                        <option value="ほのお">ほのお</option>
                                        <option value="みず">みず</option>
                                        <option value="でんき">でんき</option>
                                        <option value="くさ">くさ</option>
                                        <option value="こおり">こおり</option>
                                        <option value="かくとう">かくとう</option>
                                        <option value="どく">どく</option>
                                        <option value="じめん">じめん</option>
                                        <option value="ひこう">ひこう</option>
                                        <option value="エスパー">エスパー</option>
                                        <option value="むし">むし</option>
                                        <option value="いわ">いわ</option>
                                        <option value="ゴースト">ゴースト</option>
                                        <option value="ドラゴン">ドラゴン</option>
                                        <option value="あく">あく</option>
                                        <option value="はがね">はがね</option>
                                        <option value="フェアリー">フェアリー</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右カラム: ランク設定（白パネル＋select） -->
                <div class="strategy-col col-rank">
                    <div class="rank-panel-wrap">
                        <div class="rank-panel-label">ランク</div>
                        <div class="rank-panel-val" id="rank-value-display">0</div>
                        <select id="rank-select" class="rank-select-overlay">
                            <option value="6">+6</option>
                            <option value="5">+5</option>
                            <option value="4">+4</option>
                            <option value="3">+3</option>
                            <option value="2">+2</option>
                            <option value="1">+1</option>
                            <option value="0" selected>0</option>
                            <option value="-1">-1</option>
                            <option value="-2">-2</option>
                            <option value="-3">-3</option>
                            <option value="-4">-4</option>
                            <option value="-5">-5</option>
                            <option value="-6">-6</option>
                        </select>
                    </div>
                </div>

            </div><!-- end .strategy-center -->

            <!-- 下段: 攻撃側 — 画像(左・中央寄り・下) + パネル(右) -->
            <div class="battle-row battle-bottom">
                <div class="artwork-box attacker-artbox">
                    <div class="silhouette-fallback" id="attacker-fallback">?</div>
                    <img id="attacker-artwork" src="" alt="" class="pokemon-img">
                </div>
                <div id="attacker-panel" class="status-panel">
                        <div class="white-panel">
                            <div class="panel-header">
                                <input type="text" id="attacker-name" list="pokemon-list"
                                       placeholder="ポケモンのなまえ" class="name-input" autocomplete="off">
                                <span class="lv-badge">Lv.50</span>
                            </div>
                            <div class="panel-stats">
                                <div class="stat-row ev-row">
                                    <label id="attacker-ev-label">こうげき努力値</label>
                                    <input type="number" id="attacker-stat-ev" value="32" min="0" max="32">
                                </div>
                                <div class="stat-row">
                                    <label id="attacker-stat-label">こうげき実数値</label>
                                    <input type="number" id="attacker-stat" value="100">
                                </div>
                            </div>
                        </div>
                </div>
            </div>

        </div><!-- end .battle-field -->

        <!-- Footer: 判定結果 + ボタン -->
        <footer class="footer">
            <div class="result-area">
                <div class="result-label">ダメージ判定</div>
                <div id="result-status" class="status-badge">スキャン中...</div>
                <div id="result-detail" class="pct-label">0.0% 〜 0.0%</div>
                <div id="type-message" class="type-msg"></div>
            </div>
            <div class="btn-grid">
                <button id="swap-btn" class="ctrl-btn">攻守交代</button>
                <button id="attacker-mega-btn" class="ctrl-btn">メガシンカ(攻)</button>
                <button id="defender-mega-btn" class="ctrl-btn">メガシンカ(防)</button>
                <button id="stab-btn" class="ctrl-btn">タイプ一致</button>
            </div>
        </footer>

    </div><!-- end #app -->

    <datalist id="pokemon-list"></datalist>

    <script src="pokemon_data.js"></script>
    <script src="pokemon_types.js"></script>
    <script src="app.js"></script>
</body>
</html>
